<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TuringVisual — Simulator</title>
  <meta name="description" content="Interactive Turing Machine Simulator with live tape visualization, state diagram, and execution trace.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/vis-network@9.1.6/standalone/umd/vis-network.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      /* Colors assigned by prompt */
      --bg-dark: #0a0a0a;
      --text-main: #a1a1aa;
      --title-color: #ffffff;
      
      --accent-gradient: linear-gradient(to right, #f97316, #fbbf24);
      --accent-orange: #f97316;
      --accent-yellow: #fbbf24;
      
      --blob-1: #ff4d00;
      --blob-2: #e0115f;
      --blob-3: #4b0082;
      
      --glass-bg: rgba(255, 255, 255, 0.03);
      --glass-border: rgba(255, 255, 255, 0.1);
      
      --success: #4ade80;
      --error: #ff4d6d;
      --cell-size: 72px;

      /* Fallback grey variations */
      --gray-400: #999999;
      --gray-500: #666666;
      --gray-600: #444444;
      --gray-700: #2a2a2a;
      --gray-800: #1a1a1a;
      --gray-900: #0a0a0a;
      --border: rgba(255,255,255,0.06);
    }

    html, body { height: 100%; overflow: hidden; background: var(--bg-dark); }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      color: var(--text-main);
      display: flex; flex-direction: column;
      -webkit-font-smoothing: antialiased;
    }

    /* Noise overlay */
    body::after {
      content: '';
      position: fixed; inset: 0; z-index: 9999;
      pointer-events: none;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
    }

    /* ── MESH GRADIENT BLOBS ──────────────────────────── */
    .glow {
      position: fixed; border-radius: 50%;
      filter: blur(100px); opacity: 0.15;
      pointer-events: none; z-index: 0;
    }
    .glow-1 { top: -20%; left: -10%; width: 600px; height: 600px; background: var(--blob-1); animation: gfloat1 14s ease-in-out infinite; }
    .glow-2 { top: 30%; right: -10%; width: 500px; height: 500px; background: var(--blob-2); animation: gfloat2 16s ease-in-out infinite alternate; }
    .glow-3 { bottom: -20%; left: 0%; width: 700px; height: 700px; background: var(--blob-3); animation: gfloat3 18s ease-in-out infinite reverse; }
    
    @keyframes gfloat1 { 0%,100% { transform: translate(0,0); } 50% { transform: translate(40px, 30px); } }
    @keyframes gfloat2 { 0%,100% { transform: translate(0,0); } 50% { transform: translate(-30px, 40px); } }
    @keyframes gfloat3 { 0%,100% { transform: translate(0,0); } 50% { transform: translate(20px, -40px); } }

    /* headings */
    h1, h2, h3, .panel-title, .title-text { color: var(--title-color); }

    /* ── HERO SECTION ──────────────────────────── */
    .hero-section {
      display: flex; align-items: flex-end; justify-content: space-between;
      padding: 32px 40px 16px 40px;
      position: relative; z-index: 10;
    }
    .hero-title {
      font-size: 3rem; font-weight: 800;
      color: var(--title-color);
      letter-spacing: -0.04em; line-height: 1;
    }

    /* Current State Status Pill */
    .status-pill {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 6px 16px;
      border: 1px solid var(--glass-border);
      background: var(--glass-bg);
      backdrop-filter: blur(12px);
      border-radius: 24px;
      font-size: 0.75rem; font-weight: 500; letter-spacing: 0.04em; text-transform: uppercase;
      color: var(--title-color);
    }
    .status-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--gray-500);
      transition: background 0.3s, box-shadow 0.3s;
    }
    .status-dot.active { background: var(--success); box-shadow: 0 0 12px rgba(74,222,128,0.6); }
    .status-dot.halted { background: var(--accent-orange); box-shadow: 0 0 12px rgba(249,115,22, 0.6); }

    /* ── WORKSPACE LAYOUT ────────────────────── */
    #app {
      flex: 1; display: grid;
      grid-template-columns: 1fr 340px;
      grid-template-rows: auto 1fr;
      gap: 24px; padding: 0 40px 40px 40px;
      position: relative; z-index: 10;
      overflow: hidden;
    }

    /* ── GLASS CARDS ────────────────────── */
    .glass-card {
      background: var(--glass-bg);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid var(--glass-border);
      border-radius: 24px;
      display: flex; flex-direction: column;
      overflow: hidden;
      position: relative;
    }

    .panel-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 16px 24px;
      border-bottom: 1px solid var(--glass-border);
    }
    .panel-title {
      font-size: 0.75rem; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase;
    }
    .panel-badge {
      font-size: 0.625rem; font-weight: 600; letter-spacing: 0.06em;
      padding: 4px 12px;
      border: 1px solid var(--glass-border);
      border-radius: 12px;
      color: var(--text-main);
    }

    /* ── TAPE AREA CARD ──────────────────────── */
    .tape-area {
      grid-column: 1; grid-row: 1;
    }

    .tape-viewport {
      position: relative;
      height: 140px;
      overflow: hidden;
    }
    .tape-viewport::before,
    .tape-viewport::after {
      content: ''; position: absolute; top: 0; bottom: 0; z-index: 3;
      width: 140px; pointer-events: none;
    }
    .tape-viewport::before { left: 0; background: linear-gradient(to right, var(--bg-dark), transparent); }
    .tape-viewport::after  { right: 0; background: linear-gradient(to left, var(--bg-dark), transparent); }

    /* Center pointer */
    .tape-pointer {
      position: absolute; top: 0; bottom: 0;
      left: 50%; transform: translateX(-0.5px);
      width: 1px;
      background: var(--accent-gradient);
      z-index: 4; opacity: 0.5;
    }

    .tape-track {
      display: flex; align-items: center;
      height: 100%;
      position: absolute; left: 50%;
      transition: transform 0.45s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    }

    .cell {
      min-width: var(--cell-size); height: var(--cell-size);
      display: flex; align-items: center; justify-content: center;
      font-size: 1.5rem; font-weight: 500;
      color: var(--gray-500);
      border: 1px solid var(--glass-border);
      margin: 0 2px;
      flex-shrink: 0;
      transition: all 0.35s cubic-bezier(0.23, 1, 0.32, 1);
      position: relative;
      border-radius: 12px;
    }

    /* Active Highlight Override */
    .cell.active {
      color: var(--title-color);
      background: rgba(249, 115, 22, 0.08);
      border-color: var(--accent-orange);
      box-shadow: 0 0 20px rgba(249, 115, 22, 0.2), inset 0 0 20px rgba(249, 115, 22, 0.1);
      transform: scale(1.08);
      z-index: 2;
    }
    .cell.active::after {
      content: '';
      position: absolute; bottom: -8px; left: 50%; transform: translateX(-50%);
      width: 32px; height: 4px; border-radius: 2px;
      background: var(--accent-gradient);
    }

    /* ── CONTROLS BAR ───────────────────────── */
    .controls-bar {
      display: flex; align-items: center; justify-content: space-between;
      border-top: 1px solid var(--glass-border);
      padding: 0 12px;
    }

    .control-group { display: flex; align-items: center; gap: 8px; height: 60px; padding: 0 12px; }

    .ctrl-input {
      height: 36px; padding: 0 16px;
      background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border);
      border-radius: 18px;
      color: var(--title-color);
      font-family: 'Inter', sans-serif; font-size: 0.875rem; font-weight: 500;
      width: 160px; outline: none; transition: border-color 0.3s;
    }
    .ctrl-input:focus { border-color: var(--accent-orange); background: rgba(249,115,22,0.1); }

    .ctrl-btn {
      display: inline-flex; align-items: center; justify-content: center; gap: 6px;
      height: 36px; padding: 0 20px;
      background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border);
      color: var(--title-color); border-radius: 18px;
      font-family: 'Inter', sans-serif; font-size: 0.75rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.04em;
      cursor: pointer; transition: all 0.25s;
    }
    .ctrl-btn svg { width: 14px; height: 14px; stroke: currentColor; fill: none; stroke-width: 2; }
    
    .ctrl-btn:hover { background: rgba(255,255,255,0.1); }
    
    /* Primary action button styling */
    .ctrl-btn-run, .ctrl-btn-load {
      background: var(--accent-gradient);
      color: var(--bg-dark);
      border: none;
    }
    .ctrl-btn-run:hover, .ctrl-btn-load:hover {
      background: var(--accent-gradient);
      filter: brightness(1.1);
      box-shadow: 0 4px 16px rgba(249,115,22,0.3);
      color: var(--bg-dark);
    }

    .speed-group {
      display: flex; align-items: center; gap: 12px;
      padding: 0 24px;
    }
    .speed-label { font-size: 0.625rem; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text-main); }
    .speed-slider {
      -webkit-appearance: none; appearance: none;
      width: 100px; height: 4px; border-radius: 2px;
      background: rgba(255,255,255,0.1);
      outline: none;
    }
    .speed-slider::-webkit-slider-thumb {
      -webkit-appearance: none; appearance: none;
      width: 16px; height: 16px; border-radius: 50%;
      background: var(--accent-yellow); cursor: pointer;
      box-shadow: 0 0 10px rgba(251, 191, 36, 0.5);
    }

    /* ── BOTTOM PANELS ──────────────────── */
    .bottom-area {
      grid-column: 1; grid-row: 2;
      display: grid;
      grid-template-columns: 320px 1fr;
      gap: 24px; overflow: hidden;
    }

    #log {
      flex: 1; overflow-y: auto;
      padding: 16px 24px;
    }
    .log-entry {
      padding: 6px 0;
      border-bottom: 1px solid var(--glass-border);
      font-size: 0.8125rem; color: var(--text-main);
      font-variant-numeric: tabular-nums;
    }
    .log-entry:last-child { border-bottom: none; }
    .log-success { color: var(--success); }
    .log-error { color: var(--error); }

    /* State diagram */
    #graph-container {
      flex: 1; width: 100%; height: 100%; min-height: 200px;
      position: relative; background: transparent;
    }
    #graph-container canvas, .vis-network:focus, .vis-network { outline: none; }

    /* ── RULES PANEL ──── */
    .rules-panel {
      grid-column: 2; grid-row: 1 / 3;
    }
    
    .rules-format {
      padding: 12px 24px;
      border-bottom: 1px solid var(--glass-border);
      font-size: 0.6875rem; letter-spacing: 0.06em;
      font-family: 'SF Mono', 'Fira Code', monospace;
      color: var(--accent-yellow);
    }

    #rules-raw {
      flex: 1;
      background: transparent; color: var(--text-main);
      border: none; padding: 24px;
      font-family: 'SF Mono', 'Fira Code', 'Fira Mono', 'Menlo', monospace;
      font-size: 0.875rem; line-height: 2.2;
      resize: none; outline: none; letter-spacing: 0.02em;
    }
    #rules-raw:focus { color: var(--title-color); }

    .rules-actions, .presets-bar {
      display: flex; gap: 8px;
      padding: 16px 24px;
      border-top: 1px solid var(--glass-border);
    }
    .presets-bar { border-top: none; padding-top: 0; }
    
    .rules-btn, .preset-btn {
      flex: 1; height: 36px;
      background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border);
      font-family: 'Inter', sans-serif; font-size: 0.6875rem; font-weight: 600;
      letter-spacing: 0.04em; text-transform: uppercase;
      border-radius: 18px; color: var(--title-color);
      cursor: pointer; transition: all 0.25s;
    }
    .rules-btn:hover, .preset-btn:hover { background: rgba(255,255,255,0.15); }
    .rules-btn-primary { background: var(--accent-gradient); color: var(--bg-dark); border: none; }
    .rules-btn-primary:hover { filter: brightness(1.1); box-shadow: 0 4px 12px rgba(249,115,22,0.3); background: var(--accent-gradient); color: var(--bg-dark); }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 4px; }

    @media (max-width: 1000px) {
      #app { grid-template-columns: 1fr; grid-template-rows: auto auto 1fr; overflow-y: auto; display: flex; flex-direction: column; }
      .bottom-area { grid-template-columns: 1fr; display: flex; flex-direction: column; min-height: 600px; }
      .rules-panel { min-height: 400px; }
      .trace-panel { min-height: 300px; }
      .graph-panel { min-height: 400px; }
    }
  </style>
</head>
<body>

<!-- Ambient Mesh Gradient Blobs -->
<div class="glow glow-1"></div>
<div class="glow glow-2"></div>
<div class="glow glow-3"></div>

<!-- HERO SECTION -->
<div class="hero-section">
  <h1 class="hero-title">Turing.Visual</h1>
  <div class="status-pill">
    <span class="status-dot" id="status-dot"></span>
    <span id="status-text">IDLE — q0</span>
  </div>
</div>

<div id="app">

  <!-- TAPE -->
  <div class="glass-card tape-area">
    <div class="panel-header">
      <span class="panel-title">Infinite Tape</span>
      <span class="panel-badge" id="head-pos-label">Head Position — 0</span>
    </div>

    <div class="tape-viewport">
      <div class="tape-pointer"></div>
      <div class="tape-track" id="tape-track"></div>
    </div>

    <div class="controls-bar">
      <div class="control-group">
        <input class="ctrl-input" type="text" id="input-string" value="110100" placeholder="Input string…">
        <button class="ctrl-btn ctrl-btn-load" onclick="tm.load()">Load</button>
      </div>
      <div class="control-group">
        <button class="ctrl-btn ctrl-btn-run" onclick="tm.run()">
          <svg viewBox="0 0 24 24"><polygon points="6,4 20,12 6,20" stroke-linejoin="round"/></svg> Run
        </button>
        <button class="ctrl-btn ctrl-btn-pause" onclick="tm.pause()">Pause</button>
        <button class="ctrl-btn ctrl-btn-step" onclick="tm.step()">Step</button>
        <button class="ctrl-btn" onclick="tm.load()">Reset</button>
      </div>
      <div class="speed-group">
        <span class="speed-label">Speed</span>
        <input type="range" class="speed-slider" id="speed-slider" min="50" max="1000" value="400" step="50">
      </div>
    </div>
  </div>

  <!-- BOTTOM (Trace & Graph) -->
  <div class="bottom-area">
    <div class="glass-card trace-panel">
      <div class="panel-header">
        <span class="panel-title">Execution Trace</span>
        <span class="panel-badge" id="step-count">0 Steps</span>
      </div>
      <div id="log"></div>
    </div>

    <div class="glass-card graph-panel">
      <div class="panel-header">
        <span class="panel-title">State Diagram (DFA/NFA)</span>
        <span class="panel-badge" id="state-count">0 States</span>
      </div>
      <div id="graph-container"></div>
    </div>
  </div>

  <!-- RULES -->
  <div class="glass-card rules-panel">
    <div class="panel-header">
      <span class="panel-title">Transition Rules</span>
      <span class="panel-badge">CSV</span>
    </div>
    <div class="rules-format">state, read, write, dir, next</div>
    <textarea id="rules-raw" spellcheck="false">q0,1,0,R,q0
q0,0,1,R,q0
q0,B,B,L,halt</textarea>
    <div class="rules-actions">
      <button class="rules-btn" onclick="tm.parseRules()">Update Graph</button>
      <button class="rules-btn rules-btn-primary" onclick="tm.parseRules(); tm.load();">Apply & Reload</button>
    </div>
    <div class="presets-bar">
      <button class="preset-btn" onclick="loadPreset('flip')">Bit Flip</button>
      <button class="preset-btn" onclick="loadPreset('binary-inc')">Binary +1</button>
      <button class="preset-btn" onclick="loadPreset('palindrome')">Palindrome</button>
    </div>
  </div>

</div>

<script>
  // ── PRESETS ──────────────────────────────────────────────────────────────
  const PRESETS = {
    'flip': {
      rules: `q0,1,0,R,q0\nq0,0,1,R,q0\nq0,B,B,L,halt`,
      input: '110100'
    },
    'binary-inc': {
      rules: `q0,0,0,R,q0\nq0,1,1,R,q0\nq0,B,B,L,q1\nq1,1,0,L,q1\nq1,0,1,L,halt\nq1,B,1,L,halt`,
      input: '1011'
    },
    'palindrome': {
      rules: `q0,0,B,R,q1\nq0,1,B,R,q3\nq0,B,B,R,qy\nq1,0,0,R,q1\nq1,1,1,R,q1\nq1,B,B,L,q2\nq2,0,B,L,q5\nq2,B,B,L,qy\nq2,1,1,L,qn\nq3,0,0,R,q3\nq3,1,1,R,q3\nq3,B,B,L,q4\nq4,1,B,L,q5\nq4,B,B,L,qy\nq4,0,0,L,qn\nq5,0,0,L,q5\nq5,1,1,L,q5\nq5,B,B,R,q0\nqy,B,B,R,halt\nqn,0,0,L,qn\nqn,1,1,L,qn\nqn,B,B,R,halt`,
      input: '10101'
    }
  };

  function loadPreset(key) {
    const p = PRESETS[key];
    document.getElementById('rules-raw').value = p.rules;
    document.getElementById('input-string').value = p.input;
    tm.parseRules();
    tm.load();
  }

  // ── TURING MACHINE ──────────────────────────────────────────────────────
  let stepCounter = 0;

  const tm = {
    tape: [], head: 0, state: 'q0', rules: [], isRunning: false, timer: null,

    init() { this.parseRules(); this.load(); },

    parseRules() {
      const raw = document.getElementById('rules-raw').value;
      this.rules = raw.split('\n').filter(l => l.trim()).map(l => {
        const [s, r, w, m, ns] = l.split(',').map(x => x.trim());
        return { s, r, w, m, ns };
      });
      graphRenderer.render(this.rules);
      const states = [...new Set(this.rules.flatMap(r => [r.s, r.ns]))];
      document.getElementById('state-count').textContent = states.length + ' States';
    },

    load() {
      this.pause();
      const val = document.getElementById('input-string').value || 'B';
      this.tape = [...Array(12).fill('B'), ...val.split(''), ...Array(12).fill('B')];
      this.head = 12;
      this.state = 'q0';
      stepCounter = 0;
      document.getElementById('log').innerHTML = '';
      document.getElementById('step-count').textContent = '0 Steps';
      this.log('Machine loaded — input: ' + val, 'info');
      this.renderTape(null, true);
      this.updateStatus();
      graphRenderer.highlightActive(this.state, null);
    },

    step() {
      if (this.state === 'halt') { this.pause(); return false; }
      const symbol = this.tape[this.head] || 'B';
      const rule = this.rules.find(r => r.s === this.state && r.r === symbol);

      if (!rule) {
        this.log('NO RULE for (' + this.state + ', "' + symbol + '") — halted', 'error');
        this.pause(); this.updateStatus(); return false;
      }

      const prevState = this.state;
      this.tape[this.head] = rule.w;
      this.head += (rule.m.toUpperCase() === 'R' ? 1 : -1);
      this.state = rule.ns;

      if (this.head < 0) { this.tape.unshift('B'); this.head = 0; }
      if (this.head >= this.tape.length) this.tape.push('B');

      stepCounter++;
      const arrow = rule.m.toUpperCase() === 'R' ? '→' : '←';
      this.log(
        `${stepCounter.toString().padStart(3,'0')}  (${prevState}, ${symbol}) → write ${rule.w}, move ${arrow}, goto ${this.state}`,
        this.state === 'halt' ? 'success' : 'step'
      );
      document.getElementById('step-count').textContent = stepCounter + ' Steps';
      this.renderTape(rule, false);
      this.updateStatus();

      if (this.state === 'halt') {
        this.log('Machine halted successfully', 'success');
        this.pause(); return false;
      }
      return true;
    },

    run() {
      if (this.isRunning) return;
      this.isRunning = true;
      this.log('Running…', 'info');
      this.updateStatus();
      const speed = 1050 - parseInt(document.getElementById('speed-slider').value);
      this.timer = setInterval(() => { if (!this.step()) this.pause(); }, speed);
    },

    pause() {
      if (this.isRunning) this.log('Paused', 'info');
      this.isRunning = false;
      clearInterval(this.timer);
      this.updateStatus();
    },

    updateStatus() {
      const dot = document.getElementById('status-dot');
      const text = document.getElementById('status-text');
      dot.className = 'status-dot';
      if (this.state === 'halt') {
        dot.classList.add('halted');
        text.textContent = 'HALTED';
      } else if (this.isRunning) {
        dot.classList.add('active');
        text.textContent = 'RUNNING — ' + this.state;
      } else {
        text.textContent = 'IDLE — ' + this.state;
      }
    },

    log(msg, type) {
      const el = document.getElementById('log');
      const cls = type === 'error' ? 'log-error' : type === 'success' ? 'log-success' : type === 'info' ? 'log-info' : '';
      el.innerHTML += `<div class="log-entry ${cls}">${msg}</div>`;
      el.scrollTop = el.scrollHeight;
    },

    renderTape(activeRule, instant = false) {
      const track = document.getElementById('tape-track');
      const CELL_W = 76; // cell + margin

      if (track.children.length !== this.tape.length) {
        track.innerHTML = this.tape.map((ch, i) =>
          `<div class="cell${i === this.head ? ' active' : ''}">${ch === 'B' ? '·' : ch}</div>`
        ).join('');
      } else {
        this.tape.forEach((ch, i) => {
          const cell = track.children[i];
          cell.textContent = ch === 'B' ? '·' : ch;
          cell.className = 'cell' + (i === this.head ? ' active' : '');
        });
      }

      const offset = (this.head * CELL_W) + (CELL_W / 2);
      if (instant) {
        track.style.transition = 'none';
        track.style.transform = `translateX(-${offset}px)`;
        void track.offsetHeight;
      } else {
        track.style.transition = 'transform 0.45s cubic-bezier(0.25, 0.46, 0.45, 0.94)';
        track.style.transform = `translateX(-${offset}px)`;
      }

      document.getElementById('head-pos-label').textContent = 'HEADPOSITION — ' + this.head;
      graphRenderer.highlightActive(this.state, activeRule);
    }
  };

  // ── GRAPH RENDERER (vis-network) ────────────────────────────────────────
  const graphRenderer = {
    network: null, visNodes: null, visEdges: null,
    rulesList: [], lastActiveNode: null, lastActiveEdge: null,

    colors: {
      nodeBorder: 'rgba(255,255,255,0.1)',
      nodeBackground: 'rgba(255,255,255,0.03)',
      nodeFont: '#a1a1aa',
      haltBorder: '#fbbf24',
      haltBackground: 'rgba(251, 191, 36, 0.06)',
      haltFont: '#fbbf24',
      activeBorder: '#f97316',
      activeBackground: 'rgba(249, 115, 22, 0.15)',
      activeFont: '#ffffff',
      edgeColor: 'rgba(255,255,255,0.15)',
      edgeFont: '#a1a1aa',
      edgeActive: '#fbbf24',
      edgeActiveFont: '#fbbf24',
    },

    render(rules) {
      this.rulesList = rules;
      const stateNames = [...new Set(rules.flatMap(r => [r.s, r.ns]))];

      const nodesArr = stateNames.map(s => {
        const isHalt = (s === 'halt');
        return {
          id: s, label: s, shape: 'circle', size: 22,
          font: { size: 13, color: isHalt ? this.colors.haltFont : this.colors.nodeFont, face: 'Inter, sans-serif' },
          color: {
            border: isHalt ? this.colors.haltBorder : this.colors.nodeBorder,
            background: isHalt ? this.colors.haltBackground : this.colors.nodeBackground,
            highlight: { border: this.colors.activeBorder, background: this.colors.activeBackground },
            hover: { border: this.colors.activeBorder, background: 'rgba(249, 115, 22, 0.1)' }
          },
          borderWidth: 1, borderWidthSelected: 2, shadow: false,
          ...(isHalt ? { shapeProperties: { borderDashes: [5, 4] } } : {})
        };
      });

      const edgeMap = new Map();
      rules.forEach((rule) => {
        const key = `${rule.s}→${rule.ns}`;
        if (!edgeMap.has(key)) edgeMap.set(key, { from: rule.s, to: rule.ns, labels: [] });
        edgeMap.get(key).labels.push(`${rule.r}/${rule.w},${rule.m}`);
      });

      const edgesArr = [];
      edgeMap.forEach((val, key) => {
        const isSelf = (val.from === val.to);
        edgesArr.push({
          id: key, from: val.from, to: val.to,
          label: val.labels.join('\n'),
          arrows: { to: { enabled: true, scaleFactor: 0.5, type: 'arrow' } },
          color: { color: this.colors.edgeColor, highlight: this.colors.edgeActive, hover: this.colors.edgeActive, opacity: 0.8 },
          font: { size: 10, color: this.colors.edgeFont, face: 'Inter, sans-serif', strokeWidth: 0, align: 'top', multi: true },
          width: 1, hoverWidth: 0.5, selectionWidth: 1,
          smooth: isSelf ? { enabled: true, type: 'curvedCW', roundness: 0.6 } : { enabled: true, type: 'curvedCW', roundness: 0.15 },
          selfReference: { size: 30, angle: Math.PI / 3 }
        });
      });

      this.visNodes = new vis.DataSet(nodesArr);
      this.visEdges = new vis.DataSet(edgesArr);
      const container = document.getElementById('graph-container');

      if (this.network) this.network.destroy();
      this.network = new vis.Network(container, { nodes: this.visNodes, edges: this.visEdges }, {
        autoResize: true,
        physics: {
          enabled: true, solver: 'forceAtlas2Based',
          forceAtlas2Based: { gravitationalConstant: -30, centralGravity: 0.008, springLength: 120, springConstant: 0.06, damping: 0.4, avoidOverlap: 0.6 },
          stabilization: { iterations: 150, fit: true }
        },
        layout: { improvedLayout: true },
        interaction: { hover: true, tooltipDelay: 200, zoomView: true, dragView: true, dragNodes: true },
        nodes: { mass: 1.5 }, edges: { smooth: { enabled: true } }
      });

      this.network.once('stabilizationIterationsDone', () => {
        this.network.fit({ animation: { duration: 400, easingFunction: 'easeInOutQuad' } });
      });
    },

    highlightActive(currentState, rule) {
      if (!this.visNodes || !this.visEdges) return;

      if (this.lastActiveNode) {
        const isHalt = (this.lastActiveNode === 'halt');
        try { this.visNodes.update({ id: this.lastActiveNode,
          color: { border: isHalt ? this.colors.haltBorder : this.colors.nodeBorder, background: isHalt ? this.colors.haltBackground : this.colors.nodeBackground, highlight: { border: this.colors.activeBorder, background: this.colors.activeBackground }, hover: { border: this.colors.activeBorder, background: 'rgba(249, 115, 22, 0.1)' } },
          font: { color: isHalt ? this.colors.haltFont : this.colors.nodeFont, size: 13, face: 'Inter, sans-serif' }, borderWidth: 1, shadow: false
        }); } catch(e) {}
      }
      if (this.lastActiveEdge) {
        try { this.visEdges.update({ id: this.lastActiveEdge,
          color: { color: this.colors.edgeColor, highlight: this.colors.edgeActive, hover: this.colors.edgeActive, opacity: 0.8 },
          font: { color: this.colors.edgeFont, size: 10, face: 'Inter, sans-serif', strokeWidth: 0, align: 'top', multi: true }, width: 1
        }); } catch(e) {}
      }

      try { this.visNodes.update({ id: currentState,
        color: { border: this.colors.activeBorder, background: this.colors.activeBackground, highlight: { border: this.colors.activeBorder, background: this.colors.activeBackground }, hover: { border: this.colors.activeBorder, background: this.colors.activeBackground } },
        font: { color: this.colors.activeFont, size: 13, face: 'Inter, sans-serif' }, borderWidth: 2,
        shadow: { enabled: true, color: 'rgba(249,115,22,0.4)', size: 12, x: 0, y: 0 }
      }); this.lastActiveNode = currentState; } catch(e) {}

      if (rule) {
        const edgeId = `${rule.s}→${rule.ns}`;
        try { this.visEdges.update({ id: edgeId,
          color: { color: this.colors.edgeActive, highlight: this.colors.edgeActive, hover: this.colors.edgeActive, opacity: 1 },
          font: { color: this.colors.edgeActiveFont, size: 10, face: 'Inter, sans-serif', strokeWidth: 0, align: 'top', multi: true },
          width: 2.5, shadow: { enabled: true, color: 'rgba(251,191,36,0.5)', size: 8, x: 0, y: 0 }
        }); this.lastActiveEdge = edgeId; } catch(e) {}
      } else { this.lastActiveEdge = null; }
    }
  };

  document.getElementById('speed-slider').addEventListener('input', () => {
    if (tm.isRunning) {
      clearInterval(tm.timer);
      const speed = 1050 - parseInt(document.getElementById('speed-slider').value);
      tm.timer = setInterval(() => { if (!tm.step()) tm.pause(); }, speed);
    }
  });

  tm.init();
</script>
</body>
</html>
